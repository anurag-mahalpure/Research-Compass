# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
  - main

pool:
  name: MyLocalAgent

steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: "3.13"
    displayName: "Use Python 3.13"

  - script: |
      cd backend
      pip install -r requirements.txt
    displayName: "Install backend dependencies"

  - task: ArchiveFiles@2
    inputs:
      rootFolderOrFile: "$(System.DefaultWorkingDirectory)/backend"
      includeRootFolder: false
      archiveType: "zip"
      archiveFile: "$(Build.ArtifactStagingDirectory)/backend.zip"
      replaceExistingArchive: true
    displayName: "Archive backend"

  - task: AzureCLI@2
    inputs:
      azureSubscription: "Azure for Students"
      scriptType: "batch"
      scriptLocation: "inlineScript"
      inlineScript: az webapp stop --name research-compass-backend-anurag --resource-group research-compass-rg
    continueOnError: true
    displayName: "Stop backend"

  - task: AzureCLI@2
    inputs:
      azureSubscription: "Azure for Students"
      scriptType: "batch"
      scriptLocation: "inlineScript"
      inlineScript: az webapp deploy --name research-compass-backend-anurag --resource-group research-compass-rg --src-path "$(Build.ArtifactStagingDirectory)\backend.zip" --type zip
    displayName: "Deploy backend"

  - task: AzureCLI@2
    inputs:
      azureSubscription: "Azure for Students"
      scriptType: "batch"
      scriptLocation: "inlineScript"
      inlineScript: az webapp start --name research-compass-backend-anurag --resource-group research-compass-rg
    continueOnError: true
    displayName: "Start backend"

  - script: |
      cd frontend
      pip install -r requirements.txt
    displayName: "Install frontend dependencies"

  - task: ArchiveFiles@2
    inputs:
      rootFolderOrFile: "$(System.DefaultWorkingDirectory)/frontend"
      includeRootFolder: false
      archiveType: "zip"
      archiveFile: "$(Build.ArtifactStagingDirectory)/frontend.zip"
      replaceExistingArchive: true
    displayName: "Archive frontend"

  - task: AzureCLI@2
    inputs:
      azureSubscription: "Azure for Students"
      scriptType: "batch"
      scriptLocation: "inlineScript"
      inlineScript: az webapp stop --name research-compass-frontend-anurag --resource-group research-compass-rg
    continueOnError: true
    displayName: "Stop frontend"

  - task: AzureCLI@2
    inputs:
      azureSubscription: "Azure for Students"
      scriptType: "batch"
      scriptLocation: "inlineScript"
      inlineScript: az webapp deploy --name research-compass-frontend-anurag --resource-group research-compass-rg --src-path "$(Build.ArtifactStagingDirectory)\frontend.zip" --type zip
    displayName: "Deploy frontend"

  - task: AzureCLI@2
    inputs:
      azureSubscription: "Azure for Students"
      scriptType: "batch"
      scriptLocation: "inlineScript"
      inlineScript: az webapp start --name research-compass-frontend-anurag --resource-group research-compass-rg
    continueOnError: true
    displayName: "Start frontend"